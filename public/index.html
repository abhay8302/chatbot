<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUV.ai Chatbot</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <div class="logo">🤖</div>

        <div>
            <h2>STUV.ai Assistant</h2>
            <span>Online</span>
        </div>
    </header>

    <div id="messages" class="messages"></div>

    <div class="typing" id="typing">
        Assistant is typing...
    </div>

    <div class="input-area">

        <input
            id="messageInput"
            placeholder="Ask anything about STUV.ai..."
        />

        <button id="sendButton">
            Send
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
